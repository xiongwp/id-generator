# ─── ID Generator 本地开发配置 ────────────────────────────────────────────────

server:
  grpc_port: 9090     # gRPC 监听端口
  kitex_port: 9091    # Kitex (Thrift) 监听端口

database:
  dsn: "root:password@tcp(127.0.0.1:3318)/idgen?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 3600

etcd:
  endpoints:
    - "127.0.0.1:2379"
  dial_timeout: 5s
  # 若无 etcd 则 fallback 到 config 中的 worker_id
  worker_id: 0

snowflake:
  # 数据中心ID (0-31)
  datacenter_id: 0
  # worker ID 由 etcd 动态分配，此处为 etcd 不可用时的兜底值
  fallback_worker_id: 0

segment:
  # 当前号段消耗超过此比例时，异步预加载下一号段（双 Buffer）
  load_factor: 0.9
