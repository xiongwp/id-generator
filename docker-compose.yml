services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.10
    command: 
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
    networks:
      - accounting-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: idgen
    ports:
      - "3318:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - accounting-network

  id-service:
    build: .
    depends_on:
      - etcd
      - mysql
    ports:
      - "9090:9090"
    networks:
      - accounting-network

networks:
  accounting-network:
    external: true

volumes:
  etcd-data:
  mysql-data: