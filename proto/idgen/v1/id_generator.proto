syntax = "proto3";

package idgen.v1;

option go_package = "github.com/xiongwp/id-generator/gen/pb/idgen/v1;idgenpb";

// IdGenService 分布式 ID 生成服务
// 支持两种模式：
//   - 号段模式（Leaf Segment）：顺序递增，适合订单/账户等需要可读性的场景
//   - 雪花模式（Snowflake）：毫秒级时间戳+机器+序列，适合高并发随机 ID
service IdGenService {
    // GetSegmentId 获取号段模式 ID（单个）
    rpc GetSegmentId(GetSegmentIdRequest) returns (GetSegmentIdResponse);

    // BatchGetSegmentId 批量获取号段模式 ID
    rpc BatchGetSegmentId(BatchGetSegmentIdRequest) returns (BatchGetSegmentIdResponse);

    // GetSnowflakeId 获取雪花模式 ID（单个）
    rpc GetSnowflakeId(GetSnowflakeIdRequest) returns (GetSnowflakeIdResponse);

    // BatchGetSnowflakeId 批量获取雪花模式 ID
    rpc BatchGetSnowflakeId(BatchGetSnowflakeIdRequest) returns (BatchGetSnowflakeIdResponse);

    // RegisterBizTag 注册新业务标签（管理接口）
    rpc RegisterBizTag(RegisterBizTagRequest) returns (RegisterBizTagResponse);
}

// ─── 号段模式 ──────────────────────────────────────────────────────────────────

message GetSegmentIdRequest {
    // biz_tag 业务标签，如 "order"、"user"
    string biz_tag = 1;
}

message GetSegmentIdResponse {
    int64  id      = 1; // 生成的 ID
    int32  code    = 2; // 0=成功，非0=错误码
    string message = 3; // 错误信息（成功时为空）
}

message BatchGetSegmentIdRequest {
    string biz_tag = 1;
    int32  count   = 2; // 批量数量，最大 10000
}

message BatchGetSegmentIdResponse {
    repeated int64 ids     = 1;
    int32          code    = 2;
    string         message = 3;
}

// ─── 雪花模式 ──────────────────────────────────────────────────────────────────

message GetSnowflakeIdRequest {}

message GetSnowflakeIdResponse {
    int64  id      = 1;
    int32  code    = 2;
    string message = 3;
}

message BatchGetSnowflakeIdRequest {
    int32 count = 1; // 最大 10000
}

message BatchGetSnowflakeIdResponse {
    repeated int64 ids     = 1;
    int32          code    = 2;
    string         message = 3;
}

// ─── 管理接口 ──────────────────────────────────────────────────────────────────

message RegisterBizTagRequest {
    string biz_tag     = 1;
    int64  init_id     = 2; // 起始 ID，默认 1
    int32  step        = 3; // 号段步长，默认 10000
    string description = 4;
}

message RegisterBizTagResponse {
    int32  code    = 1;
    string message = 2;
}
